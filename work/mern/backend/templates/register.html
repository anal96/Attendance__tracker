<!DOCTYPE html>
<html>

<head>
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
</head>

<body>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
  <div class="card shadow-lg border-0 rounded-4" style="width: 600px;">
    <div class="card-header bg-gradient text-white text-center rounded-top-4" 
         style="background: linear-gradient(135deg, #4e73df, #1cc88a);">
      <h3 class="mb-0">👨‍💼 Employee Registration</h3>
    </div>
    <div class="card-body p-4">
      <form method="POST" action="/register">

        <!-- Row 1 -->
        <div class="row mb-3">
         
          <div class="col">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
          </div>
        </div>

        <!-- Row 2 -->
        <div class="row mb-3">
          <div class="col">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="example@email.com" required>
          </div>
          <div class="col">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" placeholder="********" required>
          </div>
        </div>

        <!-- Row 3 -->
        <div class="row mb-3">
          <div class="col">
            <label for="age" class="form-label">Age</label>
            <input type="number" class="form-control" id="age" name="age" placeholder="25" required>
          </div>
          <div class="col">
            <label for="qualification" class="form-label">Qualification</label>
            <input type="text" class="form-control" id="qualification" name="qualification" placeholder="B.Tech, MBA" required>
          </div>
        </div>

        <!-- Row 4 -->
        <div class="row mb-3">
          <div class="col">
            <label for="experience" class="form-label">Experience (Years)</label>
            <input type="number" class="form-control" id="experience" name="experience" placeholder="2" required>
          </div>
          <div class="col">
            <label for="phone" class="form-label">Phone Number</label>
            <input type="tel" class="form-control" id="phone" name="phone" placeholder="+91 9876543210" required>
          </div>
        </div>

        <!-- Address -->
        <div class="mb-3">
          <label for="address" class="form-label">Address</label>
          <textarea class="form-control" id="address" name="address" rows="2" placeholder="Enter your address"></textarea>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn w-100 text-white fw-bold py-2 rounded-3" 
                style="background: linear-gradient(135deg, #1cc88a, #4e73df);">
          ✅ Register Employee
        </button>
      </form>
    </div>
  </div>
</div>

    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>


</html>
