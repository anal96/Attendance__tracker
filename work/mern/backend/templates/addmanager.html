<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Manager - Attend Ease</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1cc88a, #4e73df);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .form-container {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      width: 450px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.2);
    }
    .form-container h3 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
      color: #4e73df;
    }
    .btn-custom {
      background: linear-gradient(135deg, #4e73df, #1cc88a);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 8px;
      padding: 10px;
      transition: 0.3s ease;
    }
    .btn-custom:hover {
      background: linear-gradient(135deg, #3751d0, #17a673);
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h3>👨‍💼 Add Manager</h3>
    <form method="post" action="/addmanager">

      <!-- Manager ID -->
      <div class="mb-3">
        <label for="managerId" class="form-label">Manager ID</label>
        <input type="number" class="form-control" id="managerId" name="managerId" placeholder="Enter Manager ID" required>
      </div>

      <!-- Name -->
      <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" name="name" placeholder="John Doe" required>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email" placeholder="manager@company.com" required>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" placeholder="********" required>
      </div>

      <!-- Department -->
      <div class="mb-3">
        <label for="department" class="form-label">Department</label>
        <input type="text" class="form-control" id="department" name="department" placeholder="HR / IT / Sales" required>
      </div>

      <!-- Phone -->
      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" class="form-control" id="phone" name="phone" placeholder="+91 9876543210" required>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-custom w-100">➕ Add Manager</button>
    </form>
  </div>

</body>
</html>
