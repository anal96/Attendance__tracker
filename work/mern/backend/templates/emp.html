<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Employee Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fc;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .navbar {
      background: linear-gradient(135deg, #4e73df, #1cc88a);
    }
    .navbar-brand {
      color: white !important;
      font-weight: bold;
    }
    .card {
      border-radius: 15px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.1);
      transition: transform 0.2s ease;
    }
    .card:hover {
      transform: translateY(-4px);
    }
    .card-title {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .btn-custom {
      background: linear-gradient(135deg, #1cc88a, #4e73df);
      border: none;
      color: white;
      font-weight: bold;
      border-radius: 10px;
      padding: 8px 16px;
      transition: 0.2s ease;
    }
    .btn-custom:hover {
      background: linear-gradient(135deg, #17a673, #3751d0);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="#">👨‍💼 Employee Dashboard</a>
      <div class="d-flex">
        <button class="btn btn-light btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Dashboard Content -->
  <div class="container py-5">
    <div class="row g-4">

      <!-- Attendance -->
      <div class="col-md-4">
        <div class="card p-4 text-center">
          <h5 class="card-title">📅 Mark Attendance</h5>
          <p class="text-muted">Check-in and Check-out for the day</p>
          <button class="btn-custom w-100 mb-2">✅ Check In</button>
          <button class="btn btn-danger w-100">⏹️ Check Out</button>
        </div>
      </div>

      <!-- Tasks -->
      <div class="col-md-4">
        <div class="card p-4 text-center">
          <h5 class="card-title">📋 My Tasks</h5>
          <p class="text-muted">View and update assigned tasks</p>
          <button class="btn-custom w-100">View Tasks</button>
        </div>
      </div>

      <!-- Apply for Leave -->
      <div class="col-md-4">
        <div class="card p-4 text-center">
          <h5 class="card-title">📝 Apply for Leave</h5>
          <p class="text-muted">Submit new leave requests</p>
          <button class="btn-custom w-100">Apply Leave</button>
        </div>
      </div>

      <!-- Feedback -->
      <div class="col-md-6">
        <div class="card p-4 text-center">
          <h5 class="card-title">💬 Feedback</h5>
          <p class="text-muted">Share your feedback with management</p>
          <button class="btn-custom w-100">Give Feedback</button>
        </div>
      </div>

      <!-- Leave Balance -->
      <div class="col-md-6">
        <div class="card p-4 text-center">
          <h5 class="card-title">📊 Leave Balance</h5>
          <p class="text-muted">Check your remaining leave balance</p>
          <button class="btn-custom w-100">View Balance</button>
        </div>
      </div>

    </div>
  </div>

</body>
</html>
